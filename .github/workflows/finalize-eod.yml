name: Finalize EOD BRVM

on:
  schedule:
    - cron: '5 17 * * 1-5'
  workflow_dispatch:

jobs:
  finalize:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install Python packages
        run: pip install -r requirements.txt

      - name: Run EOD finalization
        run: python finalize_eod.py

      - name: Commit and push
        run: |
          git config user.name "brvm-bot"
          git config user.email "brvm-bot@users.noreply.github.com"
          git add dbhistorical/ dbintraday/ logs/
          git diff --staged --quiet || git commit -m "eod $(date -u '+%Y-%m-%d')"
          git push
