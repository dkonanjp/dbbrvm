name: Scrape BRVM Intraday

on:
  schedule:
    # 1er snapshot à 09:20 (5 min après publication BRVM), puis toutes les 15 min
    # Dernier snapshot à 16:50 (avant fermeture 17:00)
    - cron: '20,35,50 9 * * 1-5'
    - cron: '5,20,35,50 10-16 * * 1-5'
  workflow_dispatch:

jobs:
  scrape:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - uses: r-lib/actions/setup-r@v2
        with:
          r-version: '4.4'

      - name: Install R packages
        run: |
          install.packages(c("rvest", "httr", "dplyr", "readr", "glue"))
        shell: Rscript {0}

      - name: Run snapshot
        run: Rscript update_brvm_db.R

      - name: Commit and push
        run: |
          git config user.name "brvm-bot"
          git config user.email "brvm-bot@users.noreply.github.com"
          git add dbintraday/ logs/
          git diff --staged --quiet || git commit -m "snapshot $(date -u '+%Y-%m-%d %H:%M') UTC"
          git push
