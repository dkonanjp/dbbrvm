name: Finalize EOD BRVM

on:
  schedule:
    - cron: '5 16 * * 1-5'
  workflow_dispatch:

jobs:
  finalize:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      issues: write

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install Python packages
        run: pip install -r requirements.txt

      - name: Run EOD finalization
        run: python finalize_eod.py

      - name: Commit and push
        run: |
          git config user.name "brvm-bot"
          git config user.email "brvm-bot@users.noreply.github.com"
          for d in dbhistorical dbintraday logs; do [ -d "$d" ] && git add "$d"; done
          git diff --staged --quiet && exit 0
          git commit -m "eod $(date -u '+%Y-%m-%d')"
          for i in 1 2 3; do
            git pull --rebase --autostash && git push && break
            sleep 3
          done

      - name: Notify on failure
        if: failure()
        uses: actions/github-script@v7
        with:
          script: |
            await github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title: `EOD échoué – ${{ github.run_id }}`,
              body: `La finalisation EOD BRVM du $(date -u '+%Y-%m-%d') a échoué.\n\nRun: https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}`
            })
