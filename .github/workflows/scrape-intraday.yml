name: Scrape BRVM Intraday

on:
  schedule:
    - cron: '20,35,50 9 * * 1-5'
    - cron: '5,20,35,50 10-16 * * 1-5'
  workflow_dispatch:

jobs:
  scrape:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      issues: write

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install Python packages
        run: pip install -r requirements.txt

      - name: Run snapshot
        run: python update_brvm_db.py

      - name: Commit and push
        run: |
          git config user.name "brvm-bot"
          git config user.email "brvm-bot@users.noreply.github.com"
          git add dbintraday/ logs/
          git diff --staged --quiet || git commit -m "snapshot $(date -u '+%Y-%m-%d %H:%M') UTC"
          git push

      - name: Notify on failure
        if: failure()
        uses: actions/github-script@v7
        with:
          script: |
            await github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title: `Snapshots échoué – ${{ github.run_id }}`,
              body: `Le snapshot BRVM du $(date -u '+%Y-%m-%d %H:%M') UTC a échoué.\n\nRun: https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}`
            })
